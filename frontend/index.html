<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RSS 阅读器</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Newsreader:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="app">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-header-content">
                    <h1>
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M4 11a9 9 0 0 1 9 9"></path>
                            <path d="M4 4a16 16 0 0 1 16 16"></path>
                            <circle cx="5" cy="19" r="1"></circle>
                        </svg>
                        RSS 阅读器
                    </h1>
                </div>
                <button class="sidebar-toggle" id="sidebarToggle" aria-label="切换侧边栏" title="切换侧边栏 (Ctrl+B)">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="15 18 9 12 15 6"></polyline>
                    </svg>
                </button>
            </div>
            <div class="source-list" id="sourceList">
                <div class="source-item active" data-source-id="all">
                    <div class="icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                            <polyline points="14 2 14 8 20 8"></polyline>
                            <line x1="16" y1="13" x2="8" y2="13"></line>
                            <line x1="16" y1="17" x2="8" y2="17"></line>
                            <polyline points="10 9 9 9 8 9"></polyline>
                        </svg>
                    </div>
                    <span class="name">全部文章</span>
                </div>
            </div>
            <div class="sidebar-footer">
                <button class="mark-all-read-btn" id="markAllReadBtn" title="全部标为已读">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="9 11 12 14 22 4"></polyline>
                        <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"></path>
                    </svg>
                    全部标为已读
                </button>
                <button class="add-source-btn" id="addSourceBtn" title="添加快捷键: N">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="12" y1="5" x2="12" y2="19"></line>
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                    </svg>
                    添加订阅源
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <div class="toolbar">
                <button class="icon-btn toolbar-sidebar-toggle" id="toolbarSidebarToggle" aria-label="展开侧边栏" title="展开侧边栏 (Ctrl+B)" style="display:none">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="9 18 15 12 9 6"></polyline>
                    </svg>
                </button>
                <div class="search-box">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="11" cy="11" r="8"></circle>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                    </svg>
                    <input type="text" id="searchInput" placeholder="搜索文章标题或内容... (按 / 聚焦)">
                </div>
                <div class="toolbar-actions">
                    <button class="icon-btn" id="refreshBtn" aria-label="刷新" title="刷新快捷键: R">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="refresh-icon">
                            <path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8"/>
                            <path d="M21 3v5h-5"/>
                        </svg>
                    </button>
                </div>
                <button class="icon-btn" id="themeToggle" aria-label="切换主题" title="切换主题 (Ctrl+T)">
                    <svg class="sun-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="5"></circle>
                        <line x1="12" y1="1" x2="12" y2="3"></line>
                        <line x1="12" y1="21" x2="12" y2="23"></line>
                        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                        <line x1="1" y1="12" x2="3" y2="12"></line>
                        <line x1="21" y1="12" x2="23" y2="12"></line>
                        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                    </svg>
                    <svg class="moon-icon" style="display:none" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                    </svg>
                </button>
            </div>
            <div class="articles-container">
                <div class="articles-grid" id="articlesGrid"></div>
                <div class="pagination" id="pagination"></div>
            </div>
        </main>
    </div>

    <!-- Preview Window -->
    <div class="preview-overlay" id="previewOverlay">
        <div class="preview-window" id="previewWindow">
            <div class="preview-header" id="previewHeader">
                <div class="preview-header-left">
                    <div class="preview-source-icon" id="previewSourceIcon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M4 11a9 9 0 0 1 9 9"></path>
                            <path d="M4 4a16 16 0 0 1 16 16"></path>
                            <circle cx="5" cy="19" r="1"></circle>
                        </svg>
                    </div>
                    <div class="preview-header-info">
                        <h3 id="previewTitle">文章标题</h3>
                        <span class="preview-meta" id="previewMeta"></span>
                    </div>
                </div>
                <button class="preview-close" id="previewClose" aria-label="关闭">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="18" y1="6" x2="6" y2="18"></line>
                        <line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                </button>
            </div>
            <div class="preview-body">
                <div class="summary-decor-top"></div>
                <div class="summary-card" id="summaryCard">
                    <div class="summary-label">
                        <svg class="summary-sparkle" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M12 2l1.5 5.5L19 9l-5.5 1.5L12 16l-1.5-5.5L5 9l5.5-1.5z"/>
                            <path class="sparkle-small" d="M18 2l.5 2L20 4.5l-1.5.5L18 7l-.5-2L16 4.5l1.5-.5z"/>
                            <path class="sparkle-tiny" d="M4 16l.3 1.2L5.5 17.5l-1.2.3L4 19l-.3-1.2-1.2-.3 1.2-.3z"/>
                        </svg>
                        AI 摘要
                    </div>
                    <div class="summary-content" id="previewSummary">
                        <div class="summary-loading">
                            <div class="shimmer-line"></div>
                            <div class="shimmer-line short"></div>
                            <div class="shimmer-line medium"></div>
                            <div class="shimmer-line short"></div>
                        </div>
                    </div>
                    <div class="summary-accent"></div>
                </div>
                <div class="summary-decor-bottom"></div>
            </div>
            <div class="preview-footer">
                <span class="preview-footer-hint">按 Esc 关闭 · 拖拽标题栏移动窗口</span>
                <button class="preview-btn primary" id="previewJump">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path>
                        <polyline points="15 3 21 3 21 9"></polyline>
                        <line x1="10" y1="14" x2="21" y2="3"></line>
                    </svg>
                    阅读原文
                </button>
            </div>
            <div class="resize-handle" id="resizeHandle"></div>
        </div>
    </div>

    <!-- Add Source Modal -->
    <div class="modal-overlay" id="addSourceModal">
        <div class="modal">
            <div class="modal-header">
                <h2>添加订阅源</h2>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label for="sourceName">名称</label>
                    <input type="text" id="sourceName" placeholder="例如：36氪">
                </div>
                <div class="form-group">
                    <label for="sourceUrl">RSS 地址</label>
                    <input type="text" id="sourceUrl" placeholder="https://example.com/feed.xml">
                </div>
            </div>
            <div class="modal-footer">
                <button class="modal-btn secondary" id="cancelAddSource">取消</button>
                <button class="modal-btn primary" id="confirmAddSource">确认添加</button>
            </div>
        </div>
    </div>

    <!-- Delete Source Modal -->
    <div class="modal-overlay delete-modal" id="deleteSourceModal" role="dialog" aria-modal="true" aria-labelledby="deleteModalTitle">
        <div class="modal delete-modal-box">
            <div class="delete-modal-header">
                <div class="delete-modal-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
                        <line x1="12" y1="9" x2="12" y2="13"/>
                        <line x1="12" y1="17" x2="12.01" y2="17"/>
                    </svg>
                </div>
                <div class="delete-modal-text">
                    <h2 id="deleteModalTitle">删除订阅源</h2>
                    <p>确定要删除 <strong id="deleteSourceName">该订阅源</strong> 吗？</p>
                </div>
            </div>
            <div class="delete-modal-body">
                <div class="delete-modal-warning">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10"/>
                        <line x1="12" y1="8" x2="12" y2="12"/>
                        <line x1="12" y1="16" x2="12.01" y2="16"/>
                    </svg>
                    <span>所有相关文章也会被删除，此操作不可恢复</span>
                </div>
            </div>
            <div class="delete-modal-footer">
                <button class="modal-btn secondary" id="cancelDeleteSource">取消</button>
                <button class="modal-btn danger" id="confirmDeleteSource">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="3 6 5 6 21 6"/>
                        <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
                    </svg>
                    确认删除
                </button>
            </div>
        </div>
    </div>

    <script type="module" src="js/app.js"></script>
</body>
</html>
